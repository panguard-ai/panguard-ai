services:
  # Backend: Threat Cloud API + CLI tools
  panguard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panguard
    restart: unless-stopped
    ports:
      - '3000:3000'
    volumes:
      - panguard-data:/data
      - ./config:/app/config:ro
    environment:
      - PANGUARD_DATA_DIR=/data
      - PANGUARD_PORT=3000
      - OLLAMA_ENDPOINT=http://ollama:11434
      # Litestream — defaults point at the bundled MinIO service so devs can
      # exercise the backup path locally without R2 credentials.
      - LITESTREAM_S3_ENDPOINT=${LITESTREAM_S3_ENDPOINT:-http://minio:9000}
      - LITESTREAM_S3_BUCKET=${LITESTREAM_S3_BUCKET:-tc-backup}
      - LITESTREAM_S3_REGION=${LITESTREAM_S3_REGION:-us-east-1}
      - LITESTREAM_S3_ACCESS_KEY_ID=${LITESTREAM_S3_ACCESS_KEY_ID:?LITESTREAM_S3_ACCESS_KEY_ID required (set in .env.docker)}
      - LITESTREAM_S3_SECRET_ACCESS_KEY=${LITESTREAM_S3_SECRET_ACCESS_KEY:?LITESTREAM_S3_SECRET_ACCESS_KEY required (set in .env.docker)}
    depends_on:
      ollama:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    networks:
      - panguard-net
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Local AI engine (optional)
  ollama:
    image: ollama/ollama:latest
    container_name: panguard-ollama
    restart: unless-stopped
    ports:
      - '11434:11434'
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - panguard-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # MinIO — local S3-compatible object store so devs can test Litestream
  # without provisioning Cloudflare R2 / AWS S3 / Backblaze B2 credentials.
  # Web console available at http://localhost:9001 (credentials from .env.docker).
  minio:
    image: minio/minio:latest
    container_name: panguard-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required (set in .env.docker)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required (set in .env.docker)}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - panguard-net
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # One-shot job — create the `tc-backup` bucket on first boot, then exit.
  # The panguard service waits for this via `service_completed_successfully`.
  minio-setup:
    image: minio/mc:latest
    container_name: panguard-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - panguard-net
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER required (set in .env.docker)}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD required (set in .env.docker)}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$MINIO_ROOT_USER\" \"$MINIO_ROOT_PASSWORD\" &&
      mc mb --ignore-existing local/tc-backup &&
      echo 'MinIO bucket tc-backup ready'
      "
    restart: 'no'

volumes:
  panguard-data:
  ollama-models:
  minio-data:

networks:
  panguard-net:
    driver: bridge
