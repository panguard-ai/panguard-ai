name: Publish migrator-community to npm

# Triggers on tags shaped `migrator-community-v*` (e.g. migrator-community-v0.1.0).
# Separate from the org-wide publish.yml so this package can be released
# independently of other workspace versions.
on:
  push:
    tags:
      - 'migrator-community-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run pnpm publish --dry-run only (no actual publish)'
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build, test, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build community package
        run: pnpm --filter @panguard-ai/migrator-community build

      - name: Type check
        run: pnpm --filter @panguard-ai/migrator-community typecheck

      - name: Run smoke tests
        run: pnpm --filter @panguard-ai/migrator-community test

      - name: Verify published version matches tag
        if: startsWith(github.ref, 'refs/tags/migrator-community-v')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/migrator-community-v}"
          PKG_VERSION=$(node -p "require('./packages/migrator-community/package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            exit 1
          fi
          echo "Version match: $TAG_VERSION"

      - name: Publish (dry run)
        if: ${{ inputs.dry_run == true }}
        working-directory: packages/migrator-community
        run: pnpm publish --access public --no-git-checks --dry-run

      - name: Publish to npm
        if: ${{ inputs.dry_run != true }}
        working-directory: packages/migrator-community
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Post-publish verification
        if: ${{ inputs.dry_run != true }}
        run: |
          PKG_VERSION=$(node -p "require('./packages/migrator-community/package.json').version")
          sleep 30
          npm view @panguard-ai/migrator-community@$PKG_VERSION version
