name: Publish to npm

on:
  push:
    tags:
      - 'v*'
  # Manual re-run against a branch when a tag build published only part of the
  # set (e.g. one package failed provenance and aborted `pnpm -r publish`).
  # pnpm skips already-published versions, so dispatching on main after the fix
  # publishes only the remaining packages — no tag rewrite needed.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm run build

      - name: Run type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm run test

      - name: Publish packages
        # Provenance is driven by NPM_CONFIG_PROVENANCE, not the --provenance CLI
        # flag: `pnpm -r publish --provenance` silently no-ops (the flag is not
        # propagated to each package's underlying npm publish), which is why 1.8.6
        # shipped without attestations. The env var IS read by the underlying npm.
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
