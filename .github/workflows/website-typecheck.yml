name: Website TypeCheck + Lint

on:
  pull_request:
    paths:
      - 'packages/website/**'
      - '.github/workflows/website-typecheck.yml'

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: TypeScript check
        run: pnpm --filter website exec tsc --noEmit
      - name: ESLint
        run: pnpm --filter website exec eslint .
