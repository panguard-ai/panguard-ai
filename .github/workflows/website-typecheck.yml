name: Website TypeCheck + Lint

on:
  pull_request:
    paths:
      - 'packages/website/**'
      - '.github/workflows/website-typecheck.yml'

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build workspace packages
        # website tsc resolves @panguard-ai/* via their built .d.ts; without this
        # step tsc fails with TS2307 "Cannot find module" on workspace deps.
        run: pnpm run build
      - name: TypeScript check
        run: pnpm --filter website exec tsc --noEmit
      # ESLint for the website is covered by the root "Lint & Format" job
      # (pnpm run lint lints all packages). The standalone `eslint .` here was
      # pre-existing-broken (Next uses `next lint`; bare eslint reports all files
      # ignored), so this redundant step is removed rather than double-linted.
