name: Verify TC Quality Gate

# One-shot verification that POST /api/atr-proposals rejects malformed
# rule_content with HTTP 400. Run manually via workflow_dispatch.
#
# Background: 2026-05-26 the PR-back workflow surfaced 14 promoted rules
# with no required fields — root-caused to a missing structural gate on
# the external proposal endpoint. Server-side fix landed in
# packages/threat-cloud/src/server.ts (commit 339fd410 / main).
#
# This workflow proves the deployed gate behaves correctly. Safe to run
# repeatedly; it submits synthetic test payloads only.

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Probe TC gate with malformed payloads
        env:
          TC_API_KEY: ${{ secrets.TC_API_KEY }}
          TC_URL: https://tc.panguard.ai
        run: |
          set -u
          STAMP=$(date +%s)
          FAIL=0
          pass() { echo "PASS  $1"; }
          fail() { echo "FAIL  $1"; FAIL=$((FAIL + 1)); }

          # Helper: POST and capture status + body
          probe() {
            local label="$1"
            local payload="$2"
            local expected_code="$3"
            local expected_error="$4"

            local body
            local status
            body=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
              -X POST "$TC_URL/api/atr-proposals" \
              -H "Authorization: Bearer $TC_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$payload")
            status="$body"

            echo "--- $label ---"
            echo "HTTP $status"
            cat /tmp/resp.json
            echo ""

            if [ "$status" != "$expected_code" ]; then
              fail "$label: expected HTTP $expected_code, got $status"
              return
            fi
            if [ -n "$expected_error" ]; then
              if ! grep -q "$expected_error" /tmp/resp.json; then
                fail "$label: expected error code '$expected_error' in body"
                return
              fi
            fi
            pass "$label"
          }

          echo "============================================================"
          echo "TC structural quality gate verification — $(date -u)"
          echo "============================================================"

          # ATRProposalSchema (packages/core/src/utils/validation.ts:97) requires:
          #   patternHash, ruleContent, llmProvider, llmModel, selfReviewVerdict
          # Fill all five so we EXIT the upstream Zod layer and HIT the new
          # parseATRRule + validateRuleMeetsStandard gate added in server.ts.
          BASE_FIELDS='"llmProvider":"test","llmModel":"test","selfReviewVerdict":"test"'

          # Test 1: plain junk text (not YAML) → expect 400 rule_parse_failed
          probe "junk-text" \
            "{\"patternHash\":\"verify_junk_$STAMP\",\"ruleContent\":\"this is not yaml just garbage\",$BASE_FIELDS}" \
            "400" \
            "rule_parse_failed"

          # Test 2: YAML but missing every required ATR rule field → expect 400 rule_quality_gate_failed
          probe "yaml-empty" \
            "{\"patternHash\":\"verify_empty_$STAMP\",\"ruleContent\":\"foo: bar\\nbaz: qux\\n\",$BASE_FIELDS}" \
            "400" \
            "rule_quality_gate_failed\\|rule_parse_failed"

          # Test 3: HTML content (definitely not YAML) → expect 400
          probe "html-content" \
            "{\"patternHash\":\"verify_html_$STAMP\",\"ruleContent\":\"<html>not a rule</html>\",$BASE_FIELDS}" \
            "400" \
            "rule_parse_failed\\|rule_quality_gate_failed"

          # Test 4: GET /api/atr-rules — verify the new read-side filter
          # (added in 33dc2c56). meta.droppedMalformed = how many rows the
          # DB has that fail the gate. After this filter ships, downstream
          # consumers (PR-back, Guard) never see them.
          echo ""
          echo "--- atr-rules-read-filter ---"
          GET_BODY=$(curl -s -H "Authorization: Bearer $TC_API_KEY" \
            "$TC_URL/api/atr-rules?since=2026-05-01T00:00:00Z")
          DROPPED=$(echo "$GET_BODY" | grep -o '"droppedMalformed":[0-9]*' | grep -o '[0-9]*$' || echo "?")
          TOTAL=$(echo "$GET_BODY" | grep -o '"total":[0-9]*' | grep -o '[0-9]*$' || echo "?")
          echo "served: $TOTAL clean rules"
          echo "dropped: $DROPPED malformed rules (hidden from consumers)"
          if [ "$DROPPED" = "?" ]; then
            fail "atr-rules-read-filter: meta.droppedMalformed missing — server may still be on old code"
          else
            pass "atr-rules-read-filter: meta.droppedMalformed=$DROPPED"
          fi

          echo ""
          echo "============================================================"
          if [ "$FAIL" -gt 0 ]; then
            echo "RESULT: $FAIL test(s) failed — gate NOT working as expected"
            exit 1
          fi
          echo "RESULT: all probes rejected — gate working"
          echo "============================================================"
