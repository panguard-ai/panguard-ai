name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-v2-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Security audit
        run: pnpm audit --audit-level high
        continue-on-error: true
      - name: Run ESLint
        run: pnpm run lint
      - name: Check formatting
        run: pnpm run format:check

  test:
    name: Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-v2-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build all packages (needed by project references)
        run: pnpm run build
      - name: Type check
        run: pnpm run typecheck
      - name: Run tests with coverage (excluding installer E2E — has its own workflow)
        run: pnpm exec vitest run --coverage --exclude 'tests/installer/**'
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-v2-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-v2-
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify ATR rules compiled files are up to date
        run: |
          node scripts/compile-atr-rules.mjs
          if ! git diff --exit-code packages/website/src/lib/atr-rules-compiled.json packages/website/src/lib/atr-rules-compiled.ts; then
            echo "::error::ATR rules compiled files are out of date. Run: node scripts/compile-atr-rules.mjs"
            exit 1
          fi
      - name: Build all packages
        run: pnpm run build
      - name: Upload website build
        uses: actions/upload-artifact@v4
        with:
          name: website-build
          path: packages/website/.next/
          retention-days: 14
