name: TC Rule PR-Back to ATR

on:
  schedule:
    # Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Fetch rules promoted since (ISO timestamp)'
        required: false
      dry_run:
        description: 'Dry run (no PRs opened)'
        type: boolean
        default: false

jobs:
  pr-back:
    name: Sync promoted TC rules to ATR repo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PanGuard
        uses: actions/checkout@v5

      # pnpm BEFORE setup-node: every other workflow in this repo (ci.yml,
      # deploy.yml, publish.yml, release.yml, website-typecheck.yml,
      # publish-migrator-community.yml) puts pnpm/action-setup first. When
      # setup-node@v5 runs first, the subsequent `pnpm install` step fails
      # with "Unable to locate executable file: pnpm" — observed 2026-05-29
      # after the v4 → v5 bump in commit bc0e5f80.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --filter @panguard-ai/threat-cloud...

      - name: Run PR-back
        env:
          TC_API_KEY: ${{ secrets.TC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.ATR_REPO_TOKEN }}
          TC_URL: https://tc.panguard.ai
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.since }}" ]; then
            ARGS="$ARGS --since ${{ inputs.since }}"
          fi
          npx tsx packages/threat-cloud/scripts/pr-back-to-atr.ts $ARGS
