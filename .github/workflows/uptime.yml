name: Uptime Monitor

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://api.panguard.ai/health || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "API healthy (HTTP $STATUS)"
          else
            echo "::error::API unhealthy (HTTP $STATUS)"
            exit 1
          fi

      - name: Check website
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" https://panguard.ai || echo "000")
          if [ "$STATUS" = "200" ]; then
            echo "Website healthy (HTTP $STATUS)"
          else
            echo "::error::Website unreachable (HTTP $STATUS)"
            exit 1
          fi

      - name: Check API response validity
        run: |
          HEALTH=$(curl -sf https://api.panguard.ai/health)
          DB=$(echo "$HEALTH" | python3 -c 'import sys,json; print(json.load(sys.stdin)["data"]["db"])' 2>/dev/null)
          if [ "$DB" = "connected" ]; then
            echo "Database connected"
          else
            echo "::error::Database disconnected"
            exit 1
          fi
