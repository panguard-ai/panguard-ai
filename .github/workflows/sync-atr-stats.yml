name: Sync ATR stats from upstream

# Pulls the canonical stats.json from agent-threat-rules and rewrites
# the shared fields in packages/website/src/lib/stats.ts so the website
# never drifts from the standard.
#
# Runs every 6 hours and on every push to main that touches stats.ts
# (catches local edits that would otherwise diverge).

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'packages/website/src/lib/stats.ts'
      - '.github/workflows/sync-atr-stats.yml'

permissions:
  contents: write
  # pull-requests permission removed — workflow now commits directly to main
  # instead of opening a PR. See "Commit + push to main" step for rationale.

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch upstream stats.json
        # ATR moved stats.json from repo-root to data/ during the Phase 1
        # measurement-layer rewrite (2026-05-23, ATR commit 008239c6).
        # The new schema uses `rules.total` (no longer `ruleCount.total`)
        # and adds a `benchmarks[]` array per Phase 6.
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/Agent-Threat-Rule/agent-threat-rules/main/data/stats.json \
            -o /tmp/atr-stats.json
          echo "Upstream version:"; node -e "console.log(require('/tmp/atr-stats.json').version)"
          echo "Upstream rules:";   node -e "console.log(require('/tmp/atr-stats.json').rules.total)"

      - name: Rewrite stats.ts shared fields
        run: |
          node packages/website/scripts/apply-atr-stats.mjs /tmp/atr-stats.json packages/website/src/lib/stats.ts

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet packages/website/src/lib/stats.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit + push to main
        # Direct push to main, no PR. Three reasons:
        #
        # 1. apply-atr-stats.mjs only touches deterministic numeric/version
        #    fields gated by `have` checks (see the script). It cannot
        #    invent arbitrary content; the diff is always small + reviewable
        #    via the regular `git log packages/website/src/lib/stats.ts`.
        # 2. The previous "Open sync PR" path failed every 6h because the
        #    panguard-ai repo Setting "Allow GitHub Actions to create and
        #    approve pull requests" is off. Direct push sidesteps that
        #    GitHub limitation entirely.
        # 3. Same pattern this repo already uses for badge-refresh-style
        #    auto-syncs; review is via post-hoc audit, not pre-merge.
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "ATR Stats Sync Bot"
          git config user.email "release@agentthreatrule.org"
          UPSTREAM_VER=$(node -e "console.log(require('/tmp/atr-stats.json').version)")
          UPSTREAM_RULES=$(node -e "console.log(require('/tmp/atr-stats.json').rules.total)")
          git add packages/website/src/lib/stats.ts
          git commit -m "chore(website): sync ATR stats to v${UPSTREAM_VER} (${UPSTREAM_RULES} rules)"
          # Race-safe push: rebase on top of remote main if any new commits
          # landed during the sync. Retries up to 3 times to absorb a
          # cron-collision window (very rare).
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"
              exit 0
            fi
            echo "push rejected (attempt $attempt), rebasing on origin/main and retrying"
            git fetch origin main
            git rebase origin/main
          done
          echo "ERROR: failed to push after 3 attempts"
          exit 1
