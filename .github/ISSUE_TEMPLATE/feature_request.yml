name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is this for?
      options:
        - panguard (CLI)
        - panguard-guard
        - panguard-scan
        - panguard-skill-auditor
        - panguard-mcp
        - atr (Agent Threat Rules)
        - threat-cloud
        - website
        - core
        - other
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered (if any).
    validations:
      required: false
