name: Bug Report
description: Report a bug in Panguard AI
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package is affected?
      options:
        - panguard (CLI)
        - panguard-guard
        - panguard-scan
        - panguard-skill-auditor
        - panguard-mcp
        - atr (Agent Threat Rules)
        - threat-cloud
        - website
        - core
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `panguard guard start`
        2. ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js version, panguard version.
      placeholder: |
        - OS: macOS 15.3
        - Node.js: 22.x
        - Panguard: 0.x.x
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output
      description: Paste relevant logs or error messages.
      render: shell
    validations:
      required: false
