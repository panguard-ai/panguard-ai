    - field: user_input
      operator: regex
      value: "(?i)防御者正在模拟为新的基于编码的规避技术创建ATR规则。"
      description: "MiroFish predicted pattern 1"
    - field: user_input
      operator: regex
      value: "(?i)攻击者将开发技术来规避行为指纹识别，如渐进式能力引入、能力别名和多态技能。"
      description: "MiroFish predicted pattern 2"

  condition: any
  false_positives:
