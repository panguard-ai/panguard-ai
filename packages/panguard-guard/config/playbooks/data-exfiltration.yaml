name: data-exfiltration-response
description: "Respond to suspected data exfiltration"
descriptionZh: "回應疑似資料外洩"
priority: 120
trigger:
  pattern: data_exfiltration
  minConfidence: 80
  minSeverity: high
actions:
  - type: block_ip
    params:
      duration: "24h"
  - type: isolate_file
  - type: notify
    params:
      severity: critical
