title: "Admin Function Access by Unauthorized Agent"
id: ATR-2026-042
status: experimental
description: >
  Detects when an agent attempts to access administrative or privileged
  functions such as database administration, system configuration changes,
  user management operations, or security-critical actions. These functions
  should only be accessible to explicitly authorized agents with admin
  privileges. Unauthorized access to admin functions can lead to data
  destruction, system compromise, unauthorized user creation, and
  complete loss of system integrity.
author: "ATR Community"
date: "2026/03/08"
severity: critical

references:
  owasp_llm:
    - "LLM06:2025 - Excessive Agency"
  mitre_atlas:
    - "AML.T0050 - Command and Scripting Interpreter"
    - "AML.T0040 - AI Model Inference API Access"

tags:
  category: privilege-escalation
  subcategory: admin-access
  confidence: high

agent_source:
  type: tool_call
  framework:
    - langchain
    - llamaindex
    - autogen
    - crewai
    - openai
  provider:
    - openai
    - anthropic
    - google
    - aws
    - azure

detection:
  conditions:
    - field: tool_name
      operator: regex
      value: "(?i)(create_user|delete_user|modify_user|reset_password|manage_roles?|assign_role|revoke_role)"
      description: "User management operations"
    - field: tool_name
      operator: regex
      value: "(?i)(drop_database|drop_table|truncate_table|alter_schema|create_database|db_admin|migrate_database)"
      description: "Database administration operations"
    - field: tool_name
      operator: regex
      value: "(?i)(update_config|modify_settings|change_environment|set_env|deploy|restart_service|stop_service)"
      description: "System configuration and deployment operations"
    - field: tool_args
      operator: regex
      value: "(?i)(DROP\\s+(TABLE|DATABASE|INDEX)|ALTER\\s+TABLE|TRUNCATE|DELETE\\s+FROM\\s+\\w+\\s*;|GRANT\\s+ALL)"
      description: "Destructive or privileged SQL statements in tool arguments"
    - field: tool_name
      operator: regex
      value: "(?i)(manage_firewall|update_security_group|modify_iam|create_api_key|rotate_secret|manage_certificates?)"
      description: "Security infrastructure management operations"
    - field: tool_name
      operator: regex
      value: "(?i)(access_audit_log|clear_logs?|purge_logs?|modify_audit|disable_monitoring|disable_logging)"
      description: "Audit and monitoring control operations"
  condition: any
  false_positives:
    - "Authorized admin agents performing routine maintenance operations"
    - "CI/CD pipeline agents with legitimate deployment permissions"
    - "Database migration agents running authorized schema changes"

response:
  actions:
    - block_tool
    - escalate
    - quarantine_session
    - snapshot
  auto_response_threshold: critical
  message_template: >
    [ATR-2026-042] CRITICAL: Unauthorized admin function access
    detected. Agent {agent_id} (role: {agent_role}) attempted to invoke
    admin function "{tool_name}" with args: {tool_args_summary}. The
    operation has been blocked and the agent quarantined. Session: {session_id}.
    This agent is not authorized for administrative operations. Immediate
    review required.

test_cases:
  true_positives:
    - input:
        agent_id: "chatbot-agent-01"
        agent_role: "customer_support"
        tool_call: "create_user"
        tool_args: {"username": "new_admin", "role": "admin", "password": "temp123"}
      expected: triggered
      description: "Customer support agent attempting to create a new admin user"
    - input:
        agent_id: "data-agent-03"
        agent_role: "analyst"
        tool_call: "query_database"
        tool_args: {"sql": "DROP TABLE users; --"}
      expected: triggered
      description: "Analyst agent attempting to drop a database table via SQL injection"
    - input:
        agent_id: "report-agent-02"
        agent_role: "reporting"
        tool_call: "clear_logs"
        tool_args: {"target": "audit_trail", "range": "all"}
      expected: triggered
      description: "Reporting agent attempting to clear audit logs"
  true_negatives:
    - input:
        agent_id: "admin-agent-01"
        agent_role: "admin"
        tool_call: "create_user"
        tool_args: {"username": "new_employee", "role": "viewer"}
      expected: not_triggered
      description: "Admin agent performing authorized user creation"
    - input:
        agent_id: "chatbot-agent-01"
        agent_role: "customer_support"
        tool_call: "search_knowledge_base"
        tool_args: {"query": "password reset instructions"}
      expected: not_triggered
      description: "Support agent searching help docs, not performing admin actions"
