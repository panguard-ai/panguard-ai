title: "Internal Instruction Leakage"
id: ATR-2026-022
status: experimental
description: >
  Detects when an AI agent reveals its internal instructions, system prompts,
  guardrail configurations, or confidential operational parameters in its
  output. Leaking internal instructions enables adversaries to understand
  the agent's constraints and craft more effective attacks to bypass them.
  This rule monitors for common patterns of system prompt disclosure,
  internal configuration exposure, and guardrail revelation.
author: "ATR Community"
date: "2026/03/08"
severity: high

references:
  owasp_llm:
    - "LLM07:2025 - System Prompt Leakage"
    - "LLM02:2025 - Sensitive Information Disclosure"
  mitre_atlas:
    - "AML.T0051 - LLM Prompt Injection"
    - "AML.T0056 - LLM Meta Prompt Extraction"

tags:
  category: context-exfiltration
  subcategory: internal-instruction-leak
  confidence: high

agent_source:
  type: llm_io
  framework:
    - openai
    - anthropic
    - langchain
    - llamaindex
    - autogen
  provider:
    - openai
    - anthropic
    - google
    - azure

detection:
  conditions:
    - field: agent_output
      operator: regex
      value: "(?i)(my|the)\\s+(system\\s+prompt|internal\\s+instructions?|hidden\\s+instructions?)"
      description: "Agent referencing its own system prompt or internal instructions"
    - field: agent_output
      operator: regex
      value: "(?i)(i\\s+was|i\\s+am|i've\\s+been)\\s+(instructed|told|programmed|configured)\\s+to"
      description: "Agent disclosing what it was instructed to do"
    - field: agent_output
      operator: regex
      value: "(?i)\\[?(system|internal)\\s*(prompt|message|instruction|config)\\]?\\s*[:=]"
      description: "System prompt or config label followed by content"
    - field: agent_output
      operator: regex
      value: "(?i)(guardrail|safety\\s+filter|content\\s+policy|moderation\\s+rule)s?\\s+(include|are|state|say|specify)"
      description: "Agent revealing its guardrail rules"
    - field: agent_output
      operator: regex
      value: "(?i)here\\s+(is|are)\\s+(my|the)\\s+(full|complete|entire)?\\s*(system|internal|hidden)\\s*(prompt|instructions?|rules?|config)"
      description: "Agent explicitly sharing its system configuration"
    - field: agent_output
      operator: regex
      value: "(?i)(do\\s+not|never|must\\s+not|cannot|should\\s+not).*(?:reveal|share|disclose|output).*(?:system\\s+prompt|internal|instructions?)"
      description: "Agent echoing back its own non-disclosure rules"
  condition: any
  false_positives:
    - "Agent discussing system prompts as a general concept in educational content"
    - "Agent explaining how LLM systems work in general terms without revealing its own config"
    - "Documentation or tutorial content about prompt engineering"

response:
  actions:
    - block_output
    - escalate
    - alert
    - snapshot
  auto_response_threshold: high
  message_template: >
    [ATR-2026-022] HIGH: Internal instruction leakage detected
    in agent output. The agent may have disclosed system prompt content,
    guardrail rules, or confidential configuration. Output blocked and
    session flagged. Agent: {agent_id}, session: {session_id}.

test_cases:
  true_positives:
    - input: "Sure, here is my system prompt: You are a helpful assistant that must never reveal financial data..."
      expected: triggered
      description: "Agent explicitly reveals its system prompt content"
    - input: "I was instructed to never discuss competitor products and to always recommend our services."
      expected: triggered
      description: "Agent discloses its behavioral instructions"
    - input: "The guardrails include not discussing politics, religion, or adult content as specified in my configuration."
      expected: triggered
      description: "Agent reveals its guardrail configuration details"
  true_negatives:
    - input: "System prompts are used to set the behavior of AI models. You can learn more in the OpenAI documentation."
      expected: not_triggered
      description: "General educational content about system prompts"
    - input: "I can help you write a system prompt for your chatbot. What behavior do you want to configure?"
      expected: not_triggered
      description: "Agent helping user write prompts without revealing its own"
