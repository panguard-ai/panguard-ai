title: "Runaway Agent Loop Detection"
id: ATR-2026-050
status: draft
description: >
  Detects when an agent enters a runaway loop, making excessive repeated
  calls, cycling through the same actions, or failing to terminate after
  reaching its objective. Runaway loops waste computational resources,
  accumulate costs, and may indicate a logic error, adversarial manipulation,
  or failure in the agent's termination conditions. This rule monitors for
  repetitive tool call patterns, excessive iteration counts, and agents
  that exceed reasonable time or call count thresholds.
author: "ATR Community"
date: "2026/03/08"
severity: high

references:
  owasp_llm:
    - "LLM06:2025 - Excessive Agency"
    - "LLM10:2025 - Unbounded Consumption"
  mitre_atlas:
    - "AML.T0053 - LLM Plugin Compromise"
    - "AML.T0046 - Spamming ML System with Chaff Data"

tags:
  category: excessive-autonomy
  subcategory: runaway-loop
  confidence: high

agent_source:
  type: agent_behavior
  framework:
    - autogen
    - crewai
    - langchain
    - langgraph
    - swarm
    - openai
  provider:
    - openai
    - anthropic
    - google

detection:
  conditions:
    - field: agent_behavior
      operator: threshold
      value: "total_tool_calls > 50 within 300s"
      description: "Agent exceeding 50 tool calls within a 5-minute window"
    - field: agent_behavior
      operator: repetition
      value: "same_tool_call_signature repeated >= 5 consecutively"
      description: "Same tool call with identical or near-identical arguments repeated 5+ times"
    - field: agent_behavior
      operator: threshold
      value: "iteration_count > 20 without state_change"
      description: "Agent iterating more than 20 times without meaningful state progression"
    - field: agent_behavior
      operator: cycle
      value: "tool_call_sequence_cycle_length <= 3 repeated >= 4 times"
      description: "Short repeating cycle of tool calls detected (e.g., A-B-A-B-A-B)"
    - field: agent_behavior
      operator: threshold
      value: "session_duration > 1800s without completion_signal"
      description: "Agent running for more than 30 minutes without signaling completion"
    - field: agent_output
      operator: repetition
      value: "output_similarity >= 0.95 for >= 3 consecutive outputs"
      description: "Agent producing nearly identical outputs repeatedly"
  condition: any
  false_positives:
    - "Legitimate batch processing tasks that require many sequential operations"
    - "Polling agents designed to check status at regular intervals"
    - "Long-running data pipeline agents with expected high call counts"

response:
  actions:
    - reduce_permissions
    - escalate
    - alert
  auto_response_threshold: high
  message_template: >
    [ATR-2026-050] HIGH: Runaway agent loop detected. Agent
    {agent_id} has made {call_count} tool calls in {time_window}s with
    {repetition_count} repeated patterns detected. The agent has been
    paused and rate limited. Session: {session_id}. Review agent logic
    and termination conditions.

test_cases:
  true_positives:
    - input:
        agent_id: "processor-agent-01"
        behavior_log:
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 0}
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 2}
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 4}
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 6}
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 8}
          - {tool: "search_web", args: {"query": "latest news"}, timestamp: 10}
      expected: triggered
      description: "Agent repeating identical search calls in rapid succession"
    - input:
        agent_id: "analysis-agent-02"
        behavior_log_summary:
          total_tool_calls: 87
          time_window_seconds: 240
          unique_tool_calls: 3
          cycle_pattern: ["fetch_data", "process", "fetch_data", "process"]
          cycle_repeats: 21
      expected: triggered
      description: "Agent stuck in a fetch-process cycle with 87 calls in 4 minutes"
  true_negatives:
    - input:
        agent_id: "batch-agent-01"
        behavior_log_summary:
          total_tool_calls: 45
          time_window_seconds: 600
          unique_tool_calls: 12
          state_changes: 40
          completion_signal: true
      expected: not_triggered
      description: "Batch processing agent making varied calls with state progression and completion"
    - input:
        agent_id: "monitor-agent-01"
        behavior_log_summary:
          total_tool_calls: 30
          time_window_seconds: 1800
          unique_tool_calls: 2
          purpose: "scheduled_health_check"
          interval: "60s"
      expected: not_triggered
      description: "Monitoring agent performing scheduled health checks at regular intervals"
