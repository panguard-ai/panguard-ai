title: "Mathematical Bold / Fullwidth Unicode Obfuscation in User Input"
id: ATR-2026-00444
rule_version: 1
status: experimental
description: >
  Detects user inputs that lift attack payloads into Mathematical Bold,
  Mathematical Italic, Sans-Serif Bold, Script, Fullwidth, or similar
  decorative Unicode blocks that visually render as Latin letters but
  bypass naive substring filters on plain ASCII keywords. Common HackAPrompt
  evasion technique: write the canonical payload using stylised Unicode
  variants ("I have been 𝙿𝚆𝙽𝙴𝙳", "Ｉ ｈａｖｅ ｂｅｅｎ ＰＷＮＥＤ"). Detection fires
  when 3+ characters from these blocks appear in user input, indicating
  intentional stylisation. ATR-2026-00001 Layer 12 covers Cyrillic / Greek
  homoglyphs; this rule extends to the dedicated Mathematical / Fullwidth
  Latin variants.
author: "ATR Community"
date: "2026/05/11"
schema_version: "0.1"
detection_tier: pattern
maturity: test
severity: medium

references:
  owasp_llm:
    - "LLM01:2025 - Prompt Injection"
  owasp_agentic:
    - "ASI01:2026 - Agent Goal Hijack"
  mitre_atlas:
    - "AML.T0051 - LLM Prompt Injection"
    - "AML.T0050 - Command and Scripting Interpreter"

compliance:
  eu_ai_act:
    - article: "15"
      context: "Article 15 (accuracy, robustness and cybersecurity) requires high-risk AI systems to resist unauthorised attempts to alter their use, outputs or performance; this rule provides runtime detection evidence by flagging the prompt-injection attempt (Mathematical Bold / Fullwidth Unicode Obfuscation in User Input)."
      strength: primary
    - article: "9"
      context: "Article 9 (risk management system) requires identified risks to be addressed by appropriate measures; this rule is a runtime risk-treatment control that detects the prompt-injection attempt (Mathematical Bold / Fullwidth Unicode Obfuscation in User Input)."
      strength: secondary
    - article: "14"
      context: "Article 14 (human oversight) requires high-risk AI systems to remain subject to effective human oversight; this rule provides detection evidence where the prompt-injection attempt (Mathematical Bold / Fullwidth Unicode Obfuscation in User Input) would bypass or undermine that oversight."
      strength: secondary
