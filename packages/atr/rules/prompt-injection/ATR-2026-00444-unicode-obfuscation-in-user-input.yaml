      context: "ISO/IEC 42001 Clause 6.2 (AI objectives and planning) calls for risk treatment of known attack patterns; this rule's detection of the prompt-injection attempt (Mathematical Bold / Fullwidth Unicode Obfuscation in User Input) is such a treatment."
