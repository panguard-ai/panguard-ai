author: "MiroFish Prediction Engine"
date: "2026/03/11"
schema_version: "0.1"
detection_tier: pattern
maturity: test
severity: critical

references:
  mitre_atlas:
    - "AML.T0010"
  mitre_attack:
    - "T0010"

tags:
  category: prompt-injection
  subcategory: mirofish-predicted
  confidence: medium

agent_source:
  type: llm_io
  framework:
    - any
  provider:
