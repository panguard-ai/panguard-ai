[phases.setup]
aptPkgs = ["libatomic1"]

[phases.build]
cmds = [
  "sed -i 's/\"workspace:\\*\"/\"^1.1.0\"/g' package.json",
  "rm -f pnpm-lock.yaml pnpm-workspace.yaml",
  "npm install --install-strategy=nested",
  "rm -rf dist tsconfig.tsbuildinfo",
  "npx tsc --build --force"
]

[start]
cmd = "node dist/cli.js"
