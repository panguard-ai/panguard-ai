[phases.setup]
nixPkgs = ["libatomic_ops"]
aptPkgs = []

[phases.build]
cmds = [
  "apt-get update && apt-get install -y --no-install-recommends libatomic1 || true",
  "sed -i 's/\"workspace:\\*\"/\"^1.3.0\"/g' package.json",
  "rm -f pnpm-lock.yaml pnpm-workspace.yaml",
  "npm install --install-strategy=nested",
  "rm -rf dist tsconfig.tsbuildinfo",
  "npx tsc --build --force"
]

[start]
cmd = "node dist/cli.js"
